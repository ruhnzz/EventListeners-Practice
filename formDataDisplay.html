<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        input{
            display: block;
            margin: 10px;
            padding: 5px;
        }
        .btn{
            background-color: blue;
            color: white;
            border: 2px solid rgb(215, 203, 203);
            border-radius: 5px;
            padding: 10px 50px;
            margin-top: 20px;
        }
        .btn:hover{
            background-color: rgb(32, 32, 213);
        }
        .card{
            border: 2px solid rgb(194, 181, 181);
            max-width: 200px;
            max-height: 400px;
            margin: 40px;
            display: inline-block;
            padding: 10px;
            border-radius: 10px;
            background-color: rgb(240, 231, 231);
        }
        .card h2,h3{
            text-align: center;
            margin: 10px 5px;
        }
        .profile{
            border: 2px solid black;
            width: 70px;
            height :70px;
            max-width: 100px;
            max-height: 100px;
            margin: 0 auto;
            border-radius: 50%;
             overflow: hidden;

        }
        .profile img{
            height: 100%;
            width: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <div>
        <h1>Form Data Into Card</h1>
        <form>
            <input type="text" placeholder="profile url">
            <input type="text" placeholder="name">
            <input type="text" placeholder="profession">
            <input type="text" placeholder="info">
            <input type="submit" class="btn">
        </form>
    </div>
    <!-- we use this card as reference and make the card through javascript -->
    <!-- <div class="card">
        <div class="profile">
            <img src="https://images.unsplash.com/photo-1772606270537-6eb199b55aed?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxmZWF0dXJlZC1waG90b3MtZmVlZHwyOXx8fGVufDB8fHx8fA%3D%3D" alt="">
        </div>
        <h2>Name</h2>
        <h3>Profession</h3>
        <p>Lorem ipsum dolor sit amet consectetur, adipisicing elit. Explicabo veniam ab sapiente sint mollitia! Ipsam necessitatibus optio nobis cum rerum?</p>
    </div> -->
    <script>
           //whenever we click on submit the page is reloading and the data entered in the form is becoming empty we need to stop reloading when the submit is clicked so use preventDefault
           let form = document.querySelector("form");
           form.addEventListener("submit",(e)=>{
            console.log(e)
            e.preventDefault();

            //let see the data entered in form 
           let inputs = document.querySelectorAll("input");
           console.log(inputs);
           

           //now we need to create a card with values in form
           // first lets create all required elements and styling to it
           let card = document.createElement("div");
           card.classList.add("card");

           let profile = document.createElement("div");
           profile.classList.add("profile");

           let img = document.createElement("img");
           img.setAttribute("src",inputs[0].value);
           
           let name = document.createElement("h2");
           name.textContent = inputs[1].value;

           let profession = document.createElement("h3");
           profession.textContent = inputs[2].value

           let info = document.createElement("p")
           info.textContent=inputs[3].value

           //all elements created add to parents
           profile.appendChild(img);
           card.appendChild(profile);
           card.appendChild(name);
           card.appendChild(profession);
           card.appendChild(info);
           form.appendChild(card);

           //after the data is displayed the form should become  empty
           inputs.forEach((input)=>{
            if(input.type!=="submit"){
                input.value="";
            }
           })
           })

           
    </script>
</body>
</html>
